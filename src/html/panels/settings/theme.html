<div class="settings-group">
  <h3>Color Scheme</h3>
  <div class="setting-item">
    <label for="theme-selector">Select Theme</label>
    <select id="theme-selector">
      <!-- Themes will be populated dynamically by JavaScript -->
    </select>
    <p class="info-text">Choose your preferred color scheme for the AI Assistant.</p>
  </div>
  <div class="setting-item theme-preview">
    <div>
      <label>Theme Preview</label>
      <p class="info-text">A preview of your selected theme colors.</p>
    </div>
    <div id="theme-preview-box">
      <div class="color-dot"></div>
      <div class="color-dot"></div>
      <div class="color-dot"></div>
      <div class="color-dot"></div>
      <div class="color-dot"></div>
    </div>
  </div>
</div>
<div class="settings-group">
  <h3>Optional Theme Packs</h3>
  <p class="info-text">Extra theme collections aren't loaded by default. Install one to add it to the theme list.</p>
  <div class="setting-item theme-pack-item">
    <label for="theme-pack-toggle-metal">Metal themes</label>
    <div class="toggle-container">
      <input type="checkbox" id="theme-pack-toggle-metal" data-pack="metal">
      <label for="theme-pack-toggle-metal" class="toggle-switch"></label>
    </div>
  </div>
  <div class="setting-item theme-pack-item">
    <label for="theme-pack-toggle-neon">Neon themes</label>
    <div class="toggle-container">
      <input type="checkbox" id="theme-pack-toggle-neon" data-pack="neon">
      <label for="theme-pack-toggle-neon" class="toggle-switch"></label>
    </div>
  </div>
  <div class="setting-item theme-pack-item">
    <label for="theme-pack-toggle-country">Country themes</label>
    <div class="toggle-container">
      <input type="checkbox" id="theme-pack-toggle-country" data-pack="country">
      <label for="theme-pack-toggle-country" class="toggle-switch"></label>
    </div>
  </div>
</div>
